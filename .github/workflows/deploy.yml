name: Deploy admin frontend (Angular)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          request_pty: true
          timeout: 30s
          command_timeout: 20m
          script: |
            set -e

            REPO="${{ secrets.VPS_PATH }}"
            APP="${{ secrets.VPS_APP_PATH }}"

            echo "Entrando al repo"
            cd "$REPO"

            git config --global --add safe.directory "$REPO"

            echo "Actualizando código"
            git pull origin main

            echo "Desactivando analytics Angular"
            export NG_CLI_ANALYTICS=false
            npx ng analytics off || true

            echo "Instalando dependencias"
            npm ci

            echo "Build producción"
            npm run build -- --configuration production

            DIST="$REPO/dist/crunchypaws-ecommerce-admin-frontend/browser"

            if [ ! -d "$DIST" ]; then
              echo "Error: no existe build en $DIST"
              exit 1
            fi

            echo "Backup .env (si existe)"
            if [ -f "$APP/.env" ]; then
              sudo cp "$APP/.env" /tmp/crunchypaws-admin-frontend-env-backup
            fi

            echo "Limpiando carpeta destino"
            sudo mkdir -p "$APP"
            cd "$APP"

            sudo find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              -exec rm -rf {} + || true

            echo "Copiando build Angular"
            sudo cp -R "$DIST/." "$APP/"

            echo "Restaurando .env"
            if [ -f /tmp/crunchypaws-admin-frontend-env-backup ]; then
              sudo mv /tmp/crunchypaws-admin-frontend-env-backup "$APP/.env"
              sudo chmod 600 "$APP/.env"
            fi

            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} "$APP"

            echo "Despliegue completado (listo para nginx 🚀)"