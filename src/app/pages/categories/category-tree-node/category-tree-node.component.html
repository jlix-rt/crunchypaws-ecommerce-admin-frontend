<li class="tree-node" [attr.data-testid]="'category-node-' + node().id">
  <div class="tree-node__row">
    <input
      type="checkbox"
      class="tree-node__check"
      [checked]="isSelected()"
      (change)="toggleSelectedRequest.emit({ node: node(), selected: ($any($event.target)).checked })"
      [attr.aria-label]="'Seleccionar ' + node().name"
    />
    <span class="tree-node__name" [attr.data-testid]="'category-name-' + node().id">{{
      node().name
    }}</span>
    <span class="tree-node__badge" [class.tree-node__badge--off]="!node().isVisible">
      {{ node().isVisible ? 'Visible' : 'Oculta' }}
    </span>
    <code class="tree-node__slug">{{ node().slug }}</code>
    <button
      type="button"
      class="tree-node__action"
      (click)="toggleVisibleRequest.emit(node())"
      [attr.data-testid]="'category-toggle-visible-' + node().id"
    >
      {{ node().isVisible ? 'Ocultar' : 'Mostrar' }}
    </button>
    <button
      type="button"
      class="tree-node__action"
      (click)="addChildRequest.emit(node())"
      [attr.data-testid]="'category-add-child-' + node().id"
    >
      + Sub
    </button>
    <button
      type="button"
      class="tree-node__action"
      (click)="editRequest.emit(node())"
      [attr.data-testid]="'category-edit-' + node().id"
    >
      Editar
    </button>
    <button
      type="button"
      class="tree-node__action tree-node__action--danger"
      (click)="deleteRequest.emit(node())"
      [attr.data-testid]="'category-delete-' + node().id"
    >
      Eliminar
    </button>
  </div>
  @if (node().children.length) {
    <ul class="tree-node__children">
      @for (c of node().children; track c.id) {
        <app-category-tree-node
          [node]="c"
          [selectedIds]="selectedIds()"
          (editRequest)="editRequest.emit($event)"
          (deleteRequest)="deleteRequest.emit($event)"
          (addChildRequest)="addChildRequest.emit($event)"
          (toggleSelectedRequest)="toggleSelectedRequest.emit($event)"
        />
      }
    </ul>
  }
</li>
